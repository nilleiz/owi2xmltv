version: "3.9"

services:
  owi2xmltv:
    image: nillivanilli0815/owi2xmltv:latest
    container_name: owi2xmltv
    user: "1000:1000"

    environment:
      TZ: Europe/Berlin

      # --- OpenWebIf connection ---
      OWI_HOST: "192.168.1.50"        # REQUIRED: your Enigma2 box IP/host
      OWI_PORT: "80"                  # optional
      OWI_USERNAME: ""                # if OWIF auth enabled
      OWI_PASSWORD: ""                # if OWIF auth enabled

      # --- Export settings ---
      OWI_BOUQUETS: "TV,Radio"        # comma-separated; empty => all bouquets
      OWI_OUTPUT_FILE: "/data/owi.xml"
      OWI_CONTINUOUS_NUMBERING: "true"
      OWI_CATEGORY_OVERRIDE: "/config/cat_overrides.yml"  # optional file path
      OWI_DEBUG: "false"

      # --- Scheduling ---
      CRON_SCHEDULE: "*/5 * * * *"    # empty to disable scheduler
      RUN_ON_START: "true"            # run once immediately before cron loop
      RUN_ONCE: "false"               # run a single job and exit

    volumes:
      - ./data:/data
      - ./config:/config

    restart: unless-stopped
